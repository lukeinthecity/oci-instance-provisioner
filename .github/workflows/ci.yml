name: CI

# Run the hermetic integration suite on every push to main / feature branches and on
# PRs into main. The suite mocks the OCI CLI and never touches the network, so it's safe
# to run on a public runner.
on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Least privilege: the job only needs to read the checked-out code.
permissions:
  contents: read

# Cancel an in-flight run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Integration tests (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # `shell: powershell` is Windows PowerShell 5.1 on GitHub's Windows runners — the
      # exact engine this project targets — so CI also guards the 5.1 compatibility goal.
      - name: Show PowerShell version
        shell: powershell
        run: $PSVersionTable | Format-List

      # The runner replaces `oci` with a local stub, so this needs no Oracle credentials
      # and no network. A non-zero exit from the suite fails the job (red check).
      - name: Run hermetic integration suite
        shell: powershell
        run: .\tests\Run-IntegrationTests.ps1

  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: powershell
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop

      # Analyze every script against PSScriptAnalyzerSettings.psd1; fail on any finding and
      # print the full table so the offending rule/file/line is visible in the run log.
      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings .\PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String -Width 4096 | Write-Host
            Write-Host "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: clean (0 issues)."
